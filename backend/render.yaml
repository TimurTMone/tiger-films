services:
  - type: web
    name: tiger-films-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tiger-films-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://tiger-films.vercel.app,https://tiger-films-admin.vercel.app,http://localhost:3000,http://localhost:3001"
      - key: ADMIN_SECRET
        value: "tiger-admin-2024"
    healthCheckPath: /health

databases:
  - name: tiger-films-db
    plan: free
    databaseName: tigerfilms
    user: tigerfilms
